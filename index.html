<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trafikkstatus — Stavanger Tunneler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="top">
      <div class="brand">
        <div class="hdot" id="headerDot"></div>
        <div class="brandText">
          <div class="title">Trafikkstatus Tunneler</div>
          <div class="sub">Stavanger-regionen</div>
        </div>
      </div>
      <div class="meta">
        <div class="chip weather" id="weather" style="display:none;">
          <span id="weatherIcon" class="weatherIcon"></span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 15.5c0 1.933-1.567 3.5-3.5 3.5H7c-2.761 0-5-2.239-5-5s2.239-5 5-5c0-2.761 2.239-5 5-5s5 2.239 5 5v.5c1.933 0 3.5 1.567 3.5 3.5z"/>
          </svg>
          <span id="weatherText">--°C</span>
          <span id="weatherWind" class="weatherWind"></span>
        </div>
        <div class="chip chipDate" id="date"></div>
        <div class="chip" id="clock">--:--:--</div>
        <div class="chip" id="updated">Initialiserer...</div>
      </div>
      <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
    </header>
    <main class="mainGrid">
      <section class="card tunnelsCard">
        <div class="cardHeader">
          <h2 class="h2">Tunnelstatus</h2>
        </div>
        <div class="tunnelsGrid" id="tunnelsGrid"></div>
      </section>
      <section class="card messagesCard">
        <div class="cardHeader">
          <h2 class="h2">Trafikkmeldinger</h2>
          <div class="hint" id="eventCount">0 hendelser</div>
        </div>
        <div class="itemsWrapper">
          <div class="items" id="items">
            <div class="skeleton"><div class="skeletonPulse"></div>Laster meldinger...</div>
          </div>
        </div>
      </section>
    </main>
    <footer class="foot">
      <div class="footLeft">
        <div class="note">Kilde: Statens Vegvesen (DATEX II)</div>
        <div class="note" id="health"><span class="healthDot"></span>System status: OK</div>
      </div>
      <div class="footRight">
        <div class="note">Auto-oppdaterer hvert minutt</div>
      </div>
    </footer>
  </div>
  <script src="./app.js"></script>
</body>
</html>
