<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>Trafikkstatus — E39 Stavanger</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="top">
      <div class="brand">
        <div class="hdot" id="headerDot"></div>
        <div class="brandText">
          <div class="title">Trafikkstatus</div>
          <div class="sub">E39 Stavanger-regionen</div>
        </div>
      </div>
      <div class="meta">
        <div class="chip weather" id="weather" style="display:none;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 15.5c0 1.933-1.567 3.5-3.5 3.5H7c-2.761 0-5-2.239-5-5s2.239-5 5-5c0-2.761 2.239-5 5-5s5 2.239 5 5v.5c1.933 0 3.5 1.567 3.5 3.5z"/></svg><span id="weatherText">--°C</span></div>
        <div class="chip" id="clock">--:--:--</div>
        <div class="chip" id="updated">Initialiserer...</div>
      </div>
    </header>
    <main class="grid">
      <section class="card hero">
        <div class="tunnelOverview">
          <h3 class="tunnelOverviewTitle">Tunneler i Stavanger</h3>
          <div class="tunnelGrid" id="tunnelGrid"></div>
        </div>
        <div class="featuredTunnel">
          <div class="featuredHeader">
            <h2 class="featuredName" id="featuredName">Byfjordtunnelen</h2>
            <div class="featuredMeta">
              <div class="pill" id="pill">Venter</div>
              <div class="travelTime" id="travelTime" style="display:none;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span id="travelTimeText">~3 min</span></div>
            </div>
          </div>
          <div class="featuredStatus">
            <div class="indicator" id="mainIndicator"><div class="indicatorCore"></div></div>
            <h1 class="status" id="statusText">Henter...</h1>
          </div>
          <div class="reason" id="statusReason">Synkroniserer med Statens Vegvesen...</div>
        </div>
        <div class="cams" id="camsContainer">
          <figure class="cam"><div class="camHead"><div class="camTitle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span id="camLabel1">Kamera 1</span></div><span class="stamp" id="camStamp1">--:--</span></div><div class="camContainer"><img id="cam1" alt="Kamera 1" loading="eager" /><div class="camLoader" id="camLoader1"><div class="spinner"></div></div></div></figure>
          <figure class="cam"><div class="camHead"><div class="camTitle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span id="camLabel2">Kamera 2</span></div><span class="stamp" id="camStamp2">--:--</span></div><div class="camContainer"><img id="cam2" alt="Kamera 2" loading="eager" /><div class="camLoader" id="camLoader2"><div class="spinner"></div></div></div></figure>
          <figure class="cam" id="cam3Container" style="display:none;"><div class="camHead"><div class="camTitle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span id="camLabel3">Kamera 3</span></div><span class="stamp" id="camStamp3">--:--</span></div><div class="camContainer"><img id="cam3" alt="Kamera 3" loading="eager" /><div class="camLoader" id="camLoader3"><div class="spinner"></div></div></div></figure>
        </div>
      </section>
      <section class="card list">
        <div class="listHead">
          <h2 class="h2">Andre hendelser</h2>
          <div class="hint" id="eventCount">Stavanger-regionen</div>
        </div>
        <div class="itemsWrapper">
          <div class="items" id="items">
            <div class="skeleton"><div class="skeletonPulse"></div>Laster trafikkmeldinger...</div>
          </div>
        </div>
      </section>
    </main>
    <footer class="foot">
      <div class="footLeft">
        <div class="note">Kilde: Statens Vegvesen (DATEX II)</div>
        <div class="note" id="health"><span class="healthDot"></span>System status: OK</div>
      </div>
      <div class="footRight">
        <div class="note rotationIndicator"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="rotationTimer">Neste: 60s</span></div>
      </div>
    </footer>
  </div>
  <script src="./app.js"></script>
</body>
</html>
